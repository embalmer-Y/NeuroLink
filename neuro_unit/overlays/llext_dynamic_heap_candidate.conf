# Build/static-layout candidate only.
# Enabling CONFIG_LLEXT_HEAP_DYNAMIC removes the static LLEXT heap allocation;
# runtime promotion requires explicit llext_heap_init() wiring and hardware
# smoke evidence before any default change.
CONFIG_LLEXT_HEAP_DYNAMIC=y
CONFIG_NEUROLINK_APP_PREFER_EXTERNAL_ELF_BUFFER=n
CONFIG_NEUROLINK_APP_PREFER_PSRAM_ELF_BUFFER=n
CONFIG_NEUROLINK_APP_STATIC_ELF_BUFFER_SIZE=24576